<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DBCheck 登录 - 设计稿</title>
<style>
/* ═══════════════════════════════════════
   CSS 变量
   ═══════════════════════════════════════ */
:root {
  --bg-start: #0a0a1a;
  --bg-mid:   #12122e;
  --bg-end:    #1a1040;
  --card-bg:   rgba(255,255,255,0.04);
  --card-border:rgba(255,255,255,0.08);
  --input-bg:  rgba(255,255,255,0.05);
  --input-border:rgba(255,255,255,0.12);
  --text:      #e2e8f0;
  --text-dim:  rgba(255,255,255,0.45);
  --accent:    #6c5ce7;
  --accent2:   #a29bfe;
  --danger:    #ff6b6b;
  --radius:    14px;
  --transition: .25s cubic-bezier(.4,0,.2,1);
}

[data-theme="light"] {
  --bg-start: #f0f4ff;
  --bg-mid:   #e8ecff;
  --bg-end:    #f5f0ff;
  --card-bg:   rgba(255,255,255,0.92);
  --card-border:rgba(108,92,231,0.12);
  --input-bg:  #f8fafc;
  --input-border:#e2e8f0;
  --text:      #1e293b;
  --text-dim:  #94a3b8;
}

/* ═══════════════════════════════════════
   重置 & 基础
   ═══════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
  background: #0a0a1a;
}

/* ═══════════════════════════════════════
   动态背景（CSS 粒子光晕）
   ═══════════════════════════════════════ */
.bg-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  background: linear-gradient(160deg, var(--bg-start) 0%, var(--bg-mid) 50%, var(--bg-end) 100%);
}

/* 浮动光晕 */
.bg-glow {
  position: fixed;
  border-radius: 50%;
  filter: blur(100px);
  opacity: 0.35;
  z-index: 0;
  animation: glowFloat 18s ease-in-out infinite alternate;
  pointer-events: none;
}
.bg-glow.g1 { width: 600px; height: 600px; background: #6c5ce7; top: -200px; left: -100px; animation-delay: 0s; }
.bg-glow.g2 { width: 500px; height: 500px; background: #0984e3; bottom: -150px; right: -100px; animation-delay: -6s; animation-duration: 22s; }
.bg-glow.g3 { width: 350px; height: 350px; background: #e84393; top: 40%; left: 60%; animation-delay: -12s; animation-duration: 25s; opacity: 0.2; }

@keyframes glowFloat {
  0%   { transform: translate(0, 0) scale(1); }
  33%  { transform: translate(40px, -30px) scale(1.08); }
  66%  { transform: translate(-20px, 25px) scale(0.95); }
  100% { transform: translate(15px, -10px) scale(1.03); }
}

/* 网格背景 */
.bg-grid {
  position: fixed;
  inset: 0;
  z-index: 0;
  background-image:
    linear-gradient(rgba(108,92,231,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(108,92,231,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 30%, transparent 100%);
  -webkit-mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 30%, transparent 100%);
}

/* ═══════════════════════════════════════
   登录卡片
   ═══════════════════════════════════════ */
.login-wrap {
  position: relative;
  z-index: 1;
  animation: cardEntry .7s cubic-bezier(.16,1,.3,1) both;
}

@keyframes cardEntry {
  from { opacity: 0; transform: translateY(32px) scale(.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.login-card {
  width: 400px;
  padding: 40px 36px 36px;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 22px;
  backdrop-filter: blur(24px) saturate(1.4);
  -webkit-backdrop-filter: blur(24px) saturate(1.4);
  box-shadow:
    0 8px 32px rgba(0,0,0,0.25),
    0 2px 8px rgba(0,0,0,0.15),
    inset 0 1px 0 rgba(255,255,255,0.06);
  position: relative;
  overflow: hidden;
}

/* 卡片顶部光边 */
.login-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
  opacity: 0.7;
}

/* ═══════════════════════════════════════
   Logo 区域
   ═══════════════════════════════════════ */
.logo-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 32px;
}

.logo-ring {
  width: 88px;
  height: 88px;
  border-radius: 22px;
  background: linear-gradient(135deg, var(--accent), #a29bfe, #e84393);
  padding: 3px;
  margin-bottom: 20px;
  animation: ringPulse 3s ease-in-out infinite;
  box-shadow: 0 0 40px rgba(108,92,231,0.3);
}

@keyframes ringPulse {
  0%, 100% { box-shadow: 0 0 40px rgba(108,92,231,0.3); }
  50%       { box-shadow: 0 0 60px rgba(108,92,231,0.5), 0 0 100px rgba(162,155,254,0.2); }
}

.logo-inner {
  width: 100%;
  height: 100%;
  border-radius: 20px;
  background: var(--bg-start);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  font-weight: 900;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.logo-icon {
  width: 82px;
  height: 82px;
  border-radius: 20px;
  object-fit: contain;
  display: block;
}

.login-title {
  font-size: 26px;
  font-weight: 800;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #fff 0%, #a29bfe 50%, #6c5ce7 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 6px;
}

[data-theme="light"] .login-title {
  background: linear-gradient(135deg, #1e293b 0%, #6c5ce7 100%);
  -webkit-background-clip: text;
  background-clip: text;
}

.login-subtitle {
  font-size: 12.5px;
  color: var(--text-dim);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  font-weight: 500;
}

/* ═══════════════════════════════════════
   表单
   ═══════════════════════════════════════ */
.form-group {
  margin-bottom: 18px;
  position: relative;
}

.form-label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-dim);
  margin-bottom: 7px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.form-input {
  width: 100%;
  padding: 13px 16px 13px 44px;
  background: var(--input-bg);
  border: 1.5px solid var(--input-border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 14px;
  outline: none;
  transition: var(--transition);
  position: relative;
}

.form-input::placeholder { color: rgba(255,255,255,0.2); }
[data-theme="light"] .form-input::placeholder { color: #94a3b8; }

.form-input:focus {
  border-color: var(--accent);
  background: rgba(108,92,231,0.06);
  box-shadow: 0 0 0 3px rgba(108,92,231,0.1), inset 0 1px 4px rgba(108,92,231,0.05);
}

/* 输入框图标 */
.input-icon {
  position: absolute;
  left: 15px;
  top: 50%;
  transform: translateY(-50%);
  width: 18px;
  height: 18px;
  color: var(--text-dim);
  pointer-events: none;
  transition: color var(--transition);
}

.form-group:focus-within .input-icon { color: var(--accent); }

/* 密码显示切换 */
.pwd-toggle {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  padding: 4px;
  border-radius: 6px;
  transition: var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
}
.pwd-toggle:hover { color: var(--accent); background: rgba(108,92,231,0.08); }

/* ═══════════════════════════════════════
   登录按钮
   ═══════════════════════════════════════ */
.login-btn {
  width: 100%;
  padding: 14px;
  margin-top: 6px;
  background: linear-gradient(135deg, var(--accent) 0%, #a29bfe 50%, #6c5ce7 100%);
  background-size: 200% 200%;
  border: none;
  border-radius: var(--radius);
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: var(--transition);
  letter-spacing: 0.5px;
  position: relative;
  overflow: hidden;
  animation: btnBgShift 4s ease-in-out infinite;
}

@keyframes btnBgShift {
  0%, 100% { background-position: 0% 50%; }
  50%       { background-position: 100% 50%; }
}

.login-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
  opacity: 0;
  transition: opacity var(--transition);
}

.login-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(108,92,231,0.4), 0 2px 8px rgba(108,92,231,0.2);
}
.login-btn:hover::before { opacity: 1; }

.login-btn:active {
  transform: translateY(0) scale(0.98);
}

/* 按钮涟漪 */
.ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
  transform: scale(0);
  animation: rippleOut .5s ease-out;
  pointer-events: none;
}

@keyframes rippleOut {
  to { transform: scale(4); opacity: 0; }
}

/* ═══════════════════════════════════════
   错误提示
   ═══════════════════════════════════════ */
.error-msg {
  color: var(--danger);
  font-size: 12.5px;
  margin-top: 14px;
  text-align: center;
  min-height: 20px;
  opacity: 0;
  transform: translateY(-4px);
  transition: opacity .2s, transform .2s;
}
.error-msg.show {
  opacity: 1;
  transform: translateY(0);
}

/* ═══════════════════════════════════════
   底部版本信息
   ═══════════════════════════════════════ */
.login-footer {
  text-align: center;
  margin-top: 24px;
  font-size: 11px;
  color: var(--text-dim);
  opacity: 0.6;
}

/* ═══════════════════════════════════════
   主题切换按钮
   ═══════════════════════════════════════ */
.theme-toggle {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 100;
  width: 42px;
  height: 42px;
  border-radius: 12px;
  border: 1px solid var(--card-border);
  background: var(--card-bg);
  backdrop-filter: blur(12px);
  color: var(--text-dim);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  transition: var(--transition);
}
.theme-toggle:hover {
  color: var(--accent);
  border-color: var(--accent);
  transform: rotate(15deg);
}

/* ═══════════════════════════════════════
   加载状态
   ═══════════════════════════════════════ */
.login-btn.loading {
  pointer-events: none;
  opacity: 0.75;
}
.login-btn.loading::after {
  content: '';
  position: absolute;
  width: 20px; height: 20px;
  top: 50%; left: 50%;
  margin: -10px 0 0 -10px;
  border: 2.5px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ═══════════════════════════════════════
   响应式
   ═══════════════════════════════════════ */
@media (max-width: 480px) {
  .login-card { width: 92vw; padding: 32px 24px 28px; }
  .logo-ring { width: 72px; height: 72px; border-radius: 18px; }
  .logo-inner { border-radius: 16px; font-size: 28px; }
  .login-title { font-size: 22px; }
}
</style>
</head>
<body>

<!-- 背景层 -->
<div class="bg-canvas"></div>
<div class="bg-glow g1"></div>
<div class="bg-glow g2"></div>
<div class="bg-glow g3"></div>
<div class="bg-grid"></div>

<!-- 主题切换 -->
<button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌓</button>

<!-- 登录卡片 -->
<div class="login-wrap">
  <div class="login-card">

    <!-- Logo 区域 -->
    <div class="logo-area">
      <div class="logo-ring">
        <!-- 如果有 logo 图片就用 <img class="logo-icon" src="/dbcheck_logo.png"> -->
        <div class="logo-inner">D</div>
      </div>
      <div class="login-title">DBCheck</div>
      <div class="login-subtitle">智能数据库巡检与性能分析平台</div>
    </div>

    <!-- 表单 -->
    <form onsubmit="doLogin(event)">
      <div class="form-group">
        <label class="form-label">用户名</label>
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <input class="form-input" id="login-user" type="text" placeholder="请输入用户名" autocomplete="username" autofocus>
      </div>

      <div class="form-group">
        <label class="form-label">密码</label>
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input class="form-input" id="login-pass" type="password" placeholder="请输入密码" autocomplete="current-password">
        <button type="button" class="pwd-toggle" onclick="togglePwd()" title="显示/隐藏密码">
          <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>

      <div class="error-msg" id="login-error"></div>

      <button class="login-btn" id="btn-login" type="submit">
        <span id="btn-text">登  录</span>
      </button>
    </form>

    <div class="login-footer">v2.5.0 · DBCheck © 2026</div>
  </div>
</div>

<script>
/* ─── 主题切换 ─── */
function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}
// 恢复保存的主题
(function(){
  const saved = localStorage.getItem('theme');
  if (saved) document.documentElement.setAttribute('data-theme', saved);
})();

/* ─── 密码显示切换 ─── */
function togglePwd() {
  const inp = document.getElementById('login-pass');
  const icon = document.getElementById('eye-icon');
  if (inp.type === 'password') {
    inp.type = 'text';
    icon.innerHTML = '<path d="M17.94 17.94A10.06 10.06 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.08 9.08 0 0 1 12 4c7 0 11 8 11 8a18.45 18.45 0 0 1-2.28 3.28M1 1l22 22"/>';
  } else {
    inp.type = 'password';
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}

/* ─── 登录（模拟） ─── */
function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('btn-login');
  const err = document.getElementById('login-error');
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value;

  err.classList.remove('show');
  if (!user || !pass) {
    err.textContent = '请输入用户名和密码';
    err.classList.add('show');
    shakeCard();
    return;
  }

  // 加载动画
  btn.classList.add('loading');
  document.getElementById('btn-text').style.visibility = 'hidden';

  setTimeout(() => {
    btn.classList.remove('loading');
    document.getElementById('btn-text').style.visibility = '';
    err.textContent = '登录失败：用户名或密码错误';
    err.classList.add('show');
    shakeCard();
  }, 1200);
}

/* ─── 卡片抖动 ─── */
function shakeCard() {
  const card = document.querySelector('.login-card');
  card.style.animation = 'none';
  void card.offsetWidth;
  card.style.animation = 'cardShake .4s ease';
}
const style = document.createElement('style');
style.textContent = `@keyframes cardShake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }`;
document.head.appendChild(style);

/* ─── 按钮涟漪 ─── */
document.querySelector('.login-btn').addEventListener('click', function(e) {
  const btn = this;
  const ripple = document.createElement('span');
  ripple.classList.add('ripple');
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  ripple.style.width = ripple.style.height = size + 'px';
  ripple.style.left = (e.clientX - rect.left - size/2) + 'px';
  ripple.style.top  = (e.clientY - rect.top  - size/2) + 'px';
  btn.appendChild(ripple);
  setTimeout(() => ripple.remove(), 500);
});

/* ─── 回车提交 ─── */
document.getElementById('login-pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin(e);
});
</script>
</body>
</html>
