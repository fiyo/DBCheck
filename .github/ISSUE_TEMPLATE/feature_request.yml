name: "✨ 功能建议 / Feature Request"
description: "为 DBCheck 提出新功能或改进建议"
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢建议！请描述你遇到的问题与期望的方案。
  - type: textarea
    id: problem
    attributes:
      label: "背景与问题"
      description: "当前有什么不便？为什么需要这个功能？"
      placeholder: "例如：希望支持某国产数据库的自动巡检模板。"
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: "期望的方案"
      description: "你希望如何实现或呈现？"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: "备选方案 / 参考"
      description: "是否有其他思路或参考资料？"
    validations:
      required: false
